# Custom LoRA Configuration (fp16 baseline)
experiment_name: "lora_custom"
method: "lora"  # Uses custom LoRA implementation

# Model
model_name: "Qwen/Qwen2.5-1.5B-Instruct"

# LoRA hyperparameters
lora:
  r: 8
  alpha: 16
  dropout: 0.1
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]

# Training hyperparameters
training:
  block_size: 1024
  batch_size: 2
  grad_accum_steps: 8
  lr: 0.0003
  warmup_steps: 50
  max_steps: 500
  gradient_clip: 1.0
  eval_steps: 100
  save_steps: 500
  logging_steps: 10

# Data
data:
  train_shards: ["finetune_shards/shard_train"]
  val_shard: "finetune_shards/shard_val"
  use_label_masking: true

# Optimization
optimizer:
  type: "AdamW"
  lr: 0.0003
  weight_decay: 0.3

scheduler:
  type: "linear_warmup"
  warmup_steps: 50

# Logging
wandb:
  entity: "yashuatla6-individual"
  project: "instruction-finetuning-comparison"
  tags: ["lora", "custom", "qwen", "dolly"]

# Output
output_dir: "experiments/lora_custom"
