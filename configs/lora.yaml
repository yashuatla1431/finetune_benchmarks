# Custom LoRA Configuration (fp16 baseline)
experiment_name: "lora_custom"
method: "lora"  # Uses custom LoRA implementation

# Model
model_name: "deepseek-ai/deepseek-coder-1.3b-instruct"

# LoRA hyperparameters
lora:
  r: 16
  alpha: 32
  dropout: 0.1
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]

# Training hyperparameters
training:
  block_size: 1024
  batch_size: 4
  grad_accum_steps: 4
  lr: 0.0001
  warmup_steps: 100
  max_steps: 3001
  gradient_clip: 1.0
  eval_steps: 500
  save_steps: 1500
  logging_steps: 100

# Data
data:
  train_shards: ["finetune_shards/shard_train"]
  val_shard: "finetune_shards/shard_val"
  use_label_masking: true

# Optimization
optimizer:
  type: "AdamW"
  lr: 0.0001
  weight_decay: 0.1

scheduler:
  type: "linear_warmup"
  warmup_steps: 100

# Logging
wandb:
  entity: "yashuatla6-individual"
  project: "code-finetuning-comparison"
  tags: ["lora", "custom", "baseline"]

# Output
output_dir: "experiments/lora_custom"
