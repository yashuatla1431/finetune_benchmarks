# Quick test configuration (runs in ~5 minutes)
experiment_name: "test_run"
method: "qlora"  # Test QLoRA with bitsandbytes + PEFT

# Model
model_name: "Qwen/Qwen2.5-1.5B-Instruct"

# Quantization (bitsandbytes)
quantization:
  bits: 4
  quant_type: "nf4"
  compute_dtype: "bfloat16"

# LoRA hyperparameters (PEFT)
lora:
  r: 8  # Smaller rank for faster testing
  alpha: 16
  dropout: 0.1
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]
  bias: "none"

# Training hyperparameters (MINIMAL for testing)
training:
  block_size: 1024
  batch_size: 2  # Smaller batch
  grad_accum_steps: 2
  lr: 0.00005
  warmup_steps: 10  # Very short warmup
  max_steps: 50  # Only 50 steps!
  gradient_clip: 1.0
  eval_steps: 25  # Eval once in the middle
  save_steps: 50  # Save at end
  logging_steps: 10

# Data
data:
  train_shards: ["finetune_shards/shard_train"]
  val_shard: "finetune_shards/shard_val"
  use_label_masking: false

# Optimization
optimizer:
  type: "AdamW"
  lr: 0.00005
  weight_decay: 0.3

scheduler:
  type: "linear_warmup"
  warmup_steps: 10

# Logging (optional - comment out if you don't want wandb for test)
# wandb:
#   entity: "yashuatla6-individual"
#   project: "code-finetuning-test"
#   tags: ["test"]

# Output
output_dir: "experiments/test_run"
