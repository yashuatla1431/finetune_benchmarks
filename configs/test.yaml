# Quick test configuration (runs in ~5 minutes)
experiment_name: "test_run"
method: "lora"  # Test with simplest method first

# Model
model_name: "deepseek-ai/deepseek-coder-1.3b-instruct"

# LoRA hyperparameters
lora:
  r: 8  # Smaller rank for faster testing
  alpha: 16
  target_modules: ["q_proj", "v_proj"]  # Only 2 modules instead of 4

# Training hyperparameters (MINIMAL for testing)
training:
  block_size: 1024
  batch_size: 2  # Smaller batch
  grad_accum_steps: 2
  lr: 3e-4
  warmup_steps: 10  # Very short warmup
  max_steps: 50  # Only 50 steps!
  gradient_clip: 1.0
  eval_steps: 25  # Eval once in the middle
  save_steps: 50  # Save at end
  logging_steps: 10

# Data
data:
  train_shards: ["finetune_shards/shard_train.npy"]
  val_shard: "finetune_shards/shard_val.npy"

# Optimization
optimizer:
  type: "AdamW"
  lr: 0.0003
  weight_decay: 0.01

scheduler:
  type: "linear_warmup"
  warmup_steps: 10

# Logging (optional - comment out if you don't want wandb for test)
# wandb:
#   entity: "yashuatla6-individual"
#   project: "code-finetuning-test"
#   tags: ["test"]

# Output
output_dir: "experiments/test_run"
